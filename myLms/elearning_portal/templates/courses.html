<!-- SYSTEM COMPONENT: RECURSIVE COURSE CATALOG VIEW -->
<div class="catalog-view">
    <style>
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-field-canvas {
            position: relative;
            width: 320px;
        }

        .search-field-canvas input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-field-canvas input:focus {
            border-color: #f5c340;
        }

        .search-field-canvas::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Shared Common Node Card Element Tokens */
        .course-card-node {
            background: rgba(2, 14, 46, 0.8);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .course-card-node:hover {
            transform: translateY(-5px);
            border-color: rgba(245, 195, 64, 0.3);
        }

        .card-image-canvas {
            height: 160px;
            position: relative;
            background: #1e293b;
        }

        .card-image-canvas img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-academic-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f5c340;
            color: #020e2e;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .card-details-context {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .card-course-code {
            color: #f5c340;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-course-title {
            margin: 0.5rem 0;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
        }

        .card-lecturer-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .card-action-bar {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-card-enroll {
            width: 100%;
            background: rgba(245, 195, 64, 0.1);
            border: 1px solid rgba(245, 195, 64, 0.3);
            color: #f5c340;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-card-enroll:hover {
            background: #f5c340;
            color: #020e2e;
        }

        .catalog-loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
    </style>

    <div class="catalog-header">
        <div>
            <h1 style="margin: 0; font-size: 1.75rem;">Syllabus Course Explorer</h1>
            <p style="margin: 5px 0 0 0; color: #94a3b8;">Discover modules running across your registration tracking catalog.</p>
        </div>
        <!-- Real-time Array Filtering Engine Hook -->
        <div class="search-field-canvas">
            <input type="text" placeholder="Search code, title, or instructor..." oninput="filterLoadedCourses(this.value)">
        </div>
    </div>

    <!-- Mount Point Hook Node for Database Loop Arrays -->
    <div class="course-grid" id="course-grid-mount">
        <div class="catalog-loader">Synchronizing database matrix components...</div>
    </div>
</div>
