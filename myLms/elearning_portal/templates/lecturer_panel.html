        <p style="color: #94a3b8; font-size: 0.95rem; margin: 0.5rem 0 0 0;">Create academic modules, write detailed lesson contents, attach file resources, and publish live updates instantly.</p>
    </div>

    <!-- Horizontal Two-Column Form -->
    <form id="lecturer-upload-form" style="display: flex; flex-direction: row; gap: 2.5rem; flex-wrap: wrap;">
        
        <!-- ================= LEFT COLUMN: COURSE CONFIGURATION & FILE ================= -->
        <div style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 1.5rem;">
            
            <!-- Course Selector -->
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: #f7ca44; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em;">🎯 SELECT COURSE CODE</label>
                <select id="lecturer-course-select" required style="background: rgba(2, 14, 46, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 0.85rem; border-radius: 0.5rem; color: white; font-weight: 600; width: 100%; outline: none;">
                    <option value="" disabled selected>⏳ Loading available courses...</option>
                </select>
            </div>

            <!-- Module Title -->
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: #f7ca44; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em;">📦 MODULE TITLE</label>
                <input type="text" id="lecturer-module-title" placeholder="e.g., Module 2: Memory Allocation" required style="background: rgba(2, 14, 46, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 0.85rem; border-radius: 0.5rem; color: white; outline: none;">
            </div>

            <!-- File Upload -->
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem;">

            <!-- Lesson Notes Canvas (Replaced input text with textarea but kept the same ID) -->
            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1;">
                <label style="color: #f7ca44; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em;">✍️ LESSON / TOPIC MATERIAL & NOTES</label>

                🚀 Publish Material Live
            </button>
        </div>

    </form>
</div>

<!-- Updated Database Population Script -->
<script>
async function populateLecturerCoursesDropdown() {
    const selectDropdown = document.getElementById('lecturer-course-select');
    if (!selectDropdown) return;

    try {
        console.log("📡 Fetching unique master courses for lecturer portal...");
        
        const { data: courses, error } = await _supabase
            .from('courses')
            .select('course_code, course_name');

        if (error) throw error;

        const uniqueCourses = [];
        const seenCodes = new Set();
        
        if (courses) {
            courses.forEach(item => {
                if (item.course_code) {
                    const codeUpper = item.course_code.trim().toUpperCase();
                    if (!seenCodes.has(codeUpper)) {
                        seenCodes.add(codeUpper);
                        uniqueCourses.push(item);
                    }
                }
            });
        }

        if (uniqueCourses.length === 0) {
            selectDropdown.innerHTML = '<option value="" disabled selected>⚠️ No active courses found in catalog</option>';
            return;
        }

        let optionsHTML = '<option value="" disabled selected>-- Choose an Enrolled Syllabus --</option>';
        uniqueCourses.forEach(course => {
            const code = course.course_code.trim().toUpperCase();
            const title = course.course_name ? course.course_name.trim() : "Unnamed Course";
            optionsHTML += `<option value="${code}">${code} - ${title}</option>`;
        });

        selectDropdown.innerHTML = optionsHTML;
        console.log("✅ Lecturer dropdown populated using master courses catalog.");

    } catch (err) {
        console.error("❌ Failed to populate course selection dropdown:", err);
        selectDropdown.innerHTML = '<option value="" disabled selected>❌ Error loading database courses</option>';
    }
}

populateLecturerCoursesDropdown();
</script>
