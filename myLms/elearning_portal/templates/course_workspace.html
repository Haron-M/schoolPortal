<div class="course-workspace-container">
    <style>
        .workspace-header {
            background: #23304c !important;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .workspace-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.85rem;
            color: #ffffff;
        }
        .workspace-meta {
            color: #f7ca44;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .workspace-desc {
            margin: 0;
            color: #94a3b8;
            line-height: 1.6;
            
            /* 💡 Preserves line breaks, paragraph separations, and structural spacing exactly as typed */
            white-space: pre-wrap; 
        }

        /* 🎨 Contextual overrides to honor rich-text formatting rules if inserted via innerHTML */
        .workspace-desc strong, .workspace-desc b {
            color: #ffffff !important;
            font-weight: 700;
        }
        .workspace-desc h1, .workspace-desc h2, .workspace-desc h3 {
            color: #f7ca44 !important;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .workspace-desc h1 { font-size: 1.6rem; }
        .workspace-desc h2 { font-size: 1.4rem; }
        .workspace-desc h3 { font-size: 1.2rem; }
        
        .workspace-desc ul, .workspace-desc ol {
            padding-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .workspace-desc li {
            margin-bottom: 0.4rem;
        }

        .modules-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        @keyframes workspace-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinning-loader {
            display: inline-block;
            animation: workspace-spin 2s linear infinite;
        }
    </style>

    <div class="workspace-header">
        <span class="workspace-meta">📋 Course Code: <span id="workspace-code-display">{{ course_code|upper }}</span></span>
        <h2 class="workspace-title" id="workspace-title-display">Loading Course Title...</h2>
        <p class="workspace-desc" id="workspace-desc-display">Synchronizing academic module parameters from institutional registries...</p>
    </div>

    <div class="modules-grid" id="workspace-modules-mount">
        <div class="catalog-loader" style="color: #94a3b8; text-align: center; padding: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <span class="spinning-loader">🔄</span> Building dynamic class curriculum parameters...
        </div>
    </div>
</div>
